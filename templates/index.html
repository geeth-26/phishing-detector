<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background: rgba(0,0,0,0.6);
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 25px rgba(0,0,0,0.9);
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 85%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            margin-bottom: 20px;
            font-size: 14px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            background: #00c6ff;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
            color: white;
        }

        .result {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔐 Phishing Website Detector</h1>

    <form action="/predict" method="post">
        <input type="text" name="url" placeholder="Enter URL here..." required>
        <br>
        <button type="submit">Check Website</button>
    </form>

    {% if prediction_text %}
    <div class="result" style="color: {{ color }}">
        {{ prediction_text }}
    </div>
    {% endif %}
</div>

</body>
</html>
